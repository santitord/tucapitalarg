<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TuCapitalARG — Panel de Producción</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0f11;
    --bg2: #161719;
    --bg3: #1e2023;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.13);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --green: #1fc37a;
    --green2: #0d9a5e;
    --green-bg: rgba(31,195,122,0.1);
    --blue: #4a9eff;
    --blue-bg: rgba(74,158,255,0.1);
    --amber: #f5a623;
    --amber-bg: rgba(245,166,35,0.1);
    --purple: #9b7ef8;
    --purple-bg: rgba(155,126,248,0.1);
    --red: #ff5f5f;
    --radius: 10px;
    --radius-lg: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* TOPBAR */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    position: sticky;
    top: 0;
    z-index: 50;
  }
  .logo { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .logo em { color: var(--green); font-style: normal; }
  .logo span { color: var(--text2); font-weight: 400; font-size: 13px; margin-left: 8px; }
  .add-btn {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s, transform 0.1s;
  }
  .add-btn:hover { background: #25e08c; }
  .add-btn:active { transform: scale(0.97); }

  /* STATS */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border-bottom: 1px solid var(--border);
  }
  .stat-item {
    background: var(--bg);
    padding: 14px 20px;
    text-align: center;
  }
  .stat-num { font-size: 24px; font-weight: 600; letter-spacing: -0.03em; font-family: 'DM Mono', monospace; }
  .stat-label { font-size: 11px; color: var(--text2); margin-top: 2px; text-transform: uppercase; letter-spacing: 0.06em; }
  .stat-num.green { color: var(--green); }
  .stat-num.blue { color: var(--blue); }
  .stat-num.purple { color: var(--purple); }

  /* BOARD */
  .board {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
    padding: 16px;
    align-items: start;
  }

  .column {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 12px;
    min-height: 200px;
  }

  .col-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
    padding-bottom: 10px;
    border-bottom: 1px solid var(--border);
  }
  .col-title {
    font-size: 12px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text2);
    display: flex;
    align-items: center;
    gap: 7px;
  }
  .col-dot {
    width: 7px; height: 7px; border-radius: 50%;
  }
  .dot-idea { background: var(--amber); }
  .dot-prod { background: var(--blue); }
  .dot-listo { background: var(--green); }
  .dot-pub { background: var(--purple); }

  .col-count {
    font-size: 11px;
    font-family: 'DM Mono', monospace;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 2px 8px;
    color: var(--text2);
  }

  /* CARDS */
  .card {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px;
    margin-bottom: 8px;
    cursor: pointer;
    transition: border-color 0.15s, transform 0.1s;
  }
  .card:hover { border-color: var(--border2); transform: translateY(-1px); }
  .card:last-child { margin-bottom: 0; }

  .card-title {
    font-size: 13px;
    font-weight: 500;
    color: var(--text);
    line-height: 1.45;
    margin-bottom: 9px;
  }

  .card-pills {
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    margin-bottom: 9px;
  }
  .pill {
    font-size: 10px;
    padding: 3px 8px;
    border-radius: 20px;
    display: flex;
    align-items: center;
    gap: 4px;
    font-weight: 500;
  }
  .pill.done { background: var(--green-bg); color: var(--green); }
  .pill.pending { background: var(--bg); color: var(--text3); border: 1px solid var(--border); }
  .pill-dot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

  .card-footer {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .card-date { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .card-pub-date { font-size: 11px; color: var(--purple); font-family: 'DM Mono', monospace; }

  /* EMPTY STATE */
  .empty {
    text-align: center;
    padding: 24px 12px;
    color: var(--text3);
    font-size: 12px;
    line-height: 1.6;
  }

  /* MODALS */
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 200;
    align-items: center;
    justify-content: center;
    padding: 16px;
    backdrop-filter: blur(4px);
  }
  .overlay.open { display: flex; }

  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    width: 100%;
    max-width: 540px;
    max-height: 90vh;
    overflow-y: auto;
  }

  .modal-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1.25rem;
  }
  .modal-header h2 { font-size: 16px; font-weight: 600; letter-spacing: -0.02em; }
  .close-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text2);
    width: 28px; height: 28px;
    border-radius: 50%;
    font-size: 16px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.15s;
    font-family: 'DM Sans', sans-serif;
  }
  .close-btn:hover { color: var(--text); }

  .field { margin-bottom: 1rem; }
  .field label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    margin-bottom: 6px;
  }
  .field input, .field textarea, .field select {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-size: 13px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    transition: border-color 0.15s;
    resize: vertical;
  }
  .field input:focus, .field textarea:focus, .field select:focus {
    border-color: var(--green);
  }
  .field textarea { min-height: 80px; line-height: 1.6; }
  .field select option { background: var(--bg2); }

  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

  .modal-actions {
    display: flex;
    gap: 8px;
    justify-content: flex-end;
    margin-top: 1.25rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .btn-cancel {
    background: transparent;
    border: 1px solid var(--border2);
    border-radius: var(--radius);
    padding: 8px 16px;
    font-size: 13px;
    color: var(--text2);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: border-color 0.15s;
  }
  .btn-cancel:hover { border-color: var(--text2); color: var(--text); }
  .btn-save {
    background: var(--green);
    color: #000;
    border: none;
    border-radius: var(--radius);
    padding: 8px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: background 0.15s;
  }
  .btn-save:hover { background: #25e08c; }

  /* DETAIL MODAL */
  .detail-modal { max-width: 620px; }

  .detail-status-row {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.25rem;
    flex-wrap: wrap;
  }

  .status-select {
    font-size: 12px;
    padding: 5px 10px;
    border-radius: 20px;
    border: 1px solid var(--border2);
    background: var(--bg3);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    cursor: pointer;
    outline: none;
  }

  .del-btn {
    margin-left: auto;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 5px 12px;
    font-size: 12px;
    color: var(--text3);
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: color 0.15s, border-color 0.15s;
  }
  .del-btn:hover { color: var(--red); border-color: var(--red); }

  .section-label {
    font-size: 10px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.09em;
    color: var(--text3);
    margin: 1rem 0 6px;
  }

  .content-box {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text2);
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-word;
    font-family: 'DM Mono', monospace;
    font-size: 12px;
  }
  .content-empty {
    font-size: 12px;
    color: var(--text3);
    font-style: italic;
    padding: 8px 0;
  }
  .link-item {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 14px;
    font-size: 12px;
    color: var(--green);
    word-break: break-all;
    margin-bottom: 4px;
    font-family: 'DM Mono', monospace;
  }

  .meta-row {
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    margin-top: 1rem;
    padding-top: 1rem;
    border-top: 1px solid var(--border);
  }
  .meta-item { font-size: 11px; color: var(--text3); font-family: 'DM Mono', monospace; }
  .meta-item strong { color: var(--text2); display: block; font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 2px; font-weight: 500; }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

  @media (max-width: 768px) {
    .board { grid-template-columns: 1fr 1fr; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .field-row { grid-template-columns: 1fr; }
  }
  @media (max-width: 480px) {
    .board { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="logo">TuCapital<em>ARG</em> <span>Panel de Producción</span></div>
  <button class="add-btn" onclick="openNew()">+ Nuevo Short</button>
</div>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-num" id="s-total">0</div><div class="stat-label">Total</div></div>
  <div class="stat-item"><div class="stat-num blue" id="s-prod">0</div><div class="stat-label">En producción</div></div>
  <div class="stat-item"><div class="stat-num green" id="s-listo">0</div><div class="stat-label">Listos</div></div>
  <div class="stat-item"><div class="stat-num purple" id="s-pub">0</div><div class="stat-label">Publicados</div></div>
</div>

<div class="board">
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-idea"></span>Idea</div>
      <span class="col-count" id="c-idea">0</span>
    </div>
    <div id="col-idea"><div class="empty">Sin ideas aún.<br>Creá tu primer Short.</div></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-prod"></span>En producción</div>
      <span class="col-count" id="c-prod">0</span>
    </div>
    <div id="col-prod"><div class="empty">Nada en producción.</div></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-listo"></span>Listo</div>
      <span class="col-count" id="c-listo">0</span>
    </div>
    <div id="col-listo"><div class="empty">Nada listo aún.</div></div>
  </div>
  <div class="column">
    <div class="col-header">
      <div class="col-title"><span class="col-dot dot-pub"></span>Publicado</div>
      <span class="col-count" id="c-pub">0</span>
    </div>
    <div id="col-pub"><div class="empty">Sin publicaciones.</div></div>
  </div>
</div>

<!-- NEW MODAL -->
<div class="overlay" id="new-overlay">
  <div class="modal">
    <div class="modal-header">
      <h2>Nuevo Short</h2>
      <button class="close-btn" onclick="closeNew()">×</button>
    </div>
    <div class="field"><label>Título / Idea</label><input id="f-title" placeholder="Ej: Plazo fijo vs dólar vs cripto en 2025..." /></div>
    <div class="field"><label>Guion completo</label><textarea id="f-script" placeholder="Pegá el guion con timestamps acá..." style="min-height:110px;"></textarea></div>
    <div class="field"><label>Link voz en off</label><input id="f-voice" placeholder="https://elevenlabs.io/..." /></div>
    <div class="field"><label>Links imágenes / videos (uno por línea)</label><textarea id="f-media" placeholder="https://freepik.com/...&#10;https://kling.ai/..." style="min-height:65px;"></textarea></div>
    <div class="field"><label>Notas de edición</label><textarea id="f-notes" placeholder="Cortes en segundo 0:08 y 0:22. Agregar SFX de impacto. Música tensa de fondo..." style="min-height:65px;"></textarea></div>
    <div class="field-row">
      <div class="field"><label>Estado</label>
        <select id="f-status">
          <option value="idea">Idea</option>
          <option value="prod">En producción</option>
          <option value="listo">Listo</option>
          <option value="pub">Publicado</option>
        </select>
      </div>
      <div class="field"><label>Fecha de publicación</label><input type="date" id="f-pubdate" /></div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeNew()">Cancelar</button>
      <button class="btn-save" onclick="saveCard()">Guardar Short</button>
    </div>
  </div>
</div>

<!-- DETAIL MODAL -->
<div class="overlay" id="detail-overlay">
  <div class="modal detail-modal" id="detail-inner"></div>
</div>

<script>
  let cards = JSON.parse(localStorage.getItem('tcarg_v2') || '[]');

  function persist() { localStorage.setItem('tcarg_v2', JSON.stringify(cards)); }

  function openNew() { document.getElementById('new-overlay').classList.add('open'); }
  function closeNew() {
    document.getElementById('new-overlay').classList.remove('open');
    ['f-title','f-script','f-voice','f-media','f-notes','f-pubdate'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('f-status').value = 'idea';
  }

  function saveCard() {
    const title = document.getElementById('f-title').value.trim();
    if (!title) { document.getElementById('f-title').focus(); return; }
    cards.unshift({
      id: Date.now(),
      title,
      script: document.getElementById('f-script').value.trim(),
      voice: document.getElementById('f-voice').value.trim(),
      media: document.getElementById('f-media').value.trim(),
      notes: document.getElementById('f-notes').value.trim(),
      status: document.getElementById('f-status').value,
      pubdate: document.getElementById('f-pubdate').value,
      created: new Date().toLocaleDateString('es-AR')
    });
    persist(); render(); closeNew();
  }

  function closeDetail() { document.getElementById('detail-overlay').classList.remove('open'); }

  function changeStatus(id, val) {
    const c = cards.find(x => x.id === id);
    if (c) { c.status = val; persist(); render(); renderDetail(id); }
  }

  function deleteCard(id) {
    if (!confirm('¿Eliminar este Short?')) return;
    cards = cards.filter(c => c.id !== id);
    persist(); render(); closeDetail();
  }

  function renderDetail(id) {
    const c = cards.find(x => x.id === id);
    if (!c) return;
    const statusLabels = { idea: 'Idea', prod: 'En producción', listo: 'Listo', pub: 'Publicado' };
    const statusOptions = ['idea','prod','listo','pub'].map(s =>
      `<option value="${s}" ${c.status===s?'selected':''}>${statusLabels[s]}</option>`
    ).join('');

    const mediaHtml = c.media
      ? c.media.split('\n').filter(Boolean).map(l => `<div class="link-item">${l}</div>`).join('')
      : '<div class="content-empty">Sin links cargados.</div>';

    const pubDateDisplay = c.pubdate
      ? new Date(c.pubdate + 'T12:00:00').toLocaleDateString('es-AR', { day: '2-digit', month: 'short', year: 'numeric' })
      : '—';

    document.getElementById('detail-inner').innerHTML = `
      <div class="modal-header">
        <h2 style="max-width:80%;line-height:1.35;">${c.title}</h2>
        <button class="close-btn" onclick="closeDetail()">×</button>
      </div>
      <div class="detail-status-row">
        <select class="status-select" onchange="changeStatus(${c.id}, this.value)">${statusOptions}</select>
        <button class="del-btn" onclick="deleteCard(${c.id})">Eliminar</button>
      </div>
      <div class="section-label">Guion</div>
      ${c.script ? `<div class="content-box">${c.script}</div>` : '<div class="content-empty">Sin guion cargado.</div>'}
      <div class="section-label">Voz en off</div>
      ${c.voice ? `<div class="link-item">${c.voice}</div>` : '<div class="content-empty">Sin link de voz.</div>'}
      <div class="section-label">Imágenes / Videos</div>
      ${mediaHtml}
      <div class="section-label">Notas de edición</div>
      ${c.notes ? `<div class="content-box">${c.notes}</div>` : '<div class="content-empty">Sin notas de edición.</div>'}
      <div class="meta-row">
        <div class="meta-item"><strong>Creado</strong>${c.created}</div>
        <div class="meta-item"><strong>Publicación</strong>${pubDateDisplay}</div>
      </div>
    `;
    document.getElementById('detail-overlay').classList.add('open');
  }

  function render() {
    const cols = { idea: [], prod: [], listo: [], pub: [] };
    cards.forEach(c => { if (cols[c.status]) cols[c.status].push(c); });

    const pills = (c) => {
      const items = [
        { label: 'Guion', done: !!c.script },
        { label: 'Voz', done: !!c.voice },
        { label: 'Media', done: !!c.media },
        { label: 'Notas', done: !!c.notes },
      ];
      return items.map(i => `<span class="pill ${i.done?'done':'pending'}"><span class="pill-dot"></span>${i.label}</span>`).join('');
    };

    Object.keys(cols).forEach(key => {
      const el = document.getElementById('col-' + key);
      const badge = document.getElementById('c-' + key);
      badge.textContent = cols[key].length;
      if (cols[key].length === 0) {
        const msgs = { idea: 'Sin ideas aún.<br>Creá tu primer Short.', prod: 'Nada en producción.', listo: 'Nada listo aún.', pub: 'Sin publicaciones.' };
        el.innerHTML = `<div class="empty">${msgs[key]}</div>`;
        return;
      }
      el.innerHTML = cols[key].map(c => {
        const pubBadge = c.pubdate
          ? `<span class="card-pub-date">${new Date(c.pubdate+'T12:00:00').toLocaleDateString('es-AR',{day:'2-digit',month:'short'})}</span>`
          : '';
        return `
          <div class="card" onclick="renderDetail(${c.id})">
            <div class="card-title">${c.title}</div>
            <div class="card-pills">${pills(c)}</div>
            <div class="card-footer">
              <span class="card-date">${c.created}</span>
              ${pubBadge}
            </div>
          </div>
        `;
      }).join('');
    });

    document.getElementById('s-total').textContent = cards.length;
    document.getElementById('s-prod').textContent = cols.prod.length;
    document.getElementById('s-listo').textContent = cols.listo.length;
    document.getElementById('s-pub').textContent = cols.pub.length;
  }

  // Close on overlay click
  document.getElementById('new-overlay').addEventListener('click', function(e) { if (e.target === this) closeNew(); });
  document.getElementById('detail-overlay').addEventListener('click', function(e) { if (e.target === this) closeDetail(); });

  render();
</script>
</body>
</html>
